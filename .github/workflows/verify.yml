name: Verify

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

# Cancel in-progress runs on the same PR
concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verification gate stack
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for some tools

      # --- Language setup (uncomment what applies) ---

      - name: Setup Node
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      # - name: Setup Python
      #   if: ${{ hashFiles('pyproject.toml') != '' || hashFiles('requirements.txt') != '' }}
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version-file: '.python-version'
      #     cache: 'pip'

      # - name: Setup Go
      #   if: ${{ hashFiles('go.mod') != '' }}
      #   uses: actions/setup-go@v5
      #   with:
      #     go-version-file: 'go.mod'

      # - name: Setup Rust
      #   if: ${{ hashFiles('Cargo.toml') != '' }}
      #   uses: dtolnay/rust-toolchain@stable

      # --- Install project dependencies ---

      - name: Install dependencies (Node)
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm ci

      # - name: Install dependencies (Python)
      #   if: ${{ hashFiles('requirements.txt') != '' }}
      #   run: pip install -r requirements.txt

      # --- Install verification tools (independent of language) ---

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.0/gitleaks_8.18.0_linux_x64.tar.gz \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/

      - name: Install semgrep
        run: pipx install semgrep

      # --- Run the gate stack ---

      - name: Make verify.sh executable
        run: chmod +x scripts/verify.sh

      - name: Run verification
        run: bash scripts/verify.sh

      # --- Report ---

      - name: Verification status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "::notice::All verification gates passed"
          else
            echo "::error::Verification gates failed"
          fi
