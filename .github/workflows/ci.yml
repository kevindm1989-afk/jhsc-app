name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verification gate stack
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    env:
      # Treat missing tools as failures in CI (locally they just [skip]).
      VERIFY_REQUIRE_TOOLS: '1'
      NODE_ENV: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.46.x

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/

      - name: Install semgrep
        run: pip install --user semgrep==1.95.0

      - name: Install pgTAP runtime (perl + pg_prove)
        run: |
          sudo apt-get update
          sudo apt-get install -y libtap-parser-sourcehandler-pgtap-perl postgresql-client

      - name: Build (apps/web)
        run: pnpm -C apps/web build

      - name: Run verify.sh
        run: bash scripts/verify.sh

      - name: Report
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "::notice::Verification gates passed"
          else
            echo "::error::Verification gates failed"
          fi
