name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Blocking gate: this is what must stay green. Build, strict typecheck,
  # and the full Vitest suite all pass today.
  build-and-test:
    name: Build, typecheck & tests
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    env:
      NODE_ENV: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build (apps/web)
        run: pnpm -C apps/web build

      - name: Typecheck (tsc strict)
        run: pnpm -C apps/web typecheck

      - name: Tests (vitest)
        run: pnpm -C apps/web test

  # Blocking: the full verification gate stack (lint, format, token audit,
  # i18n, secrets, SAST, Deno). The pre-production hardening debt has been
  # paid down and scripts/verify.sh passes end-to-end, so this job is now
  # required — a regression in any gate fails the run.
  hardening-gates:
    name: Hardening gates
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    env:
      VERIFY_REQUIRE_TOOLS: '1'
      NODE_ENV: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.46.x

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/

      - name: Install semgrep
        # Install into an isolated venv (not --user): the runner's --user
        # site-packages carry system urllib3/chardet that conflict with
        # semgrep's pins and made the CLI exit 7 before scanning. A clean
        # venv with an upgraded pip resolves a self-consistent dependency set.
        run: |
          python3 -m venv "$RUNNER_TEMP/semgrep-venv"
          "$RUNNER_TEMP/semgrep-venv/bin/pip" install --upgrade pip
          "$RUNNER_TEMP/semgrep-venv/bin/pip" install semgrep==1.95.0
          echo "$RUNNER_TEMP/semgrep-venv/bin" >> "$GITHUB_PATH"

      - name: Install pgTAP runtime (perl + pg_prove)
        run: |
          sudo apt-get update
          sudo apt-get install -y libtap-parser-sourcehandler-pgtap-perl postgresql-client

      - name: Build (apps/web)
        # Build a TRUE production bundle. NODE_ENV=production overrides the
        # job-level NODE_ENV=ci for this step: under NODE_ENV=ci, Vite sets
        # `import.meta.env.PROD = false` (it keys PROD off NODE_ENV, not the
        # build mode), which leaves DCE-guarded test-only code (the seam
        # imports) in the bundle — a non-deployable hybrid that would
        # false-fail the strip gate below. NODE_ENV=production matches the
        # actually-deployed artifact, so both bundle-scanning gates (no
        # third-party JS + test-props strip) inspect what really ships.
        env:
          NODE_ENV: production
        run: pnpm -C apps/web build

      - name: Test-only props stripped from prod bundle (G-T19-5)
        # Scans the production bundle (apps/web/build/, built by the step
        # above with NODE_ENV=production) for any leaked `__test_*` / `__debug*`
        # test symbol. Runs as a dedicated step rather than inside verify.sh
        # because the script fail-closes without a build dir and verify.sh also
        # runs locally. The issue-#120 PR series (prod-stripped test-config
        # seams) makes this pass; wiring it here guards against a strip
        # regression that the synthetic-fixture bundle-strip-gate.test.ts
        # cannot catch.
        run: bash scripts/check-onboarding-test-props-stripped.sh

      - name: KEY_PARITY entropy invariant (ADR-0024 §6 / F-124 M-124a)
        # Asserts the length floor on a SYNTHETIC fixture (NEVER against the
        # real production secret — that's the deploy job's job). The fixture
        # below is fixed-shape so the arithmetic is verified, not the value.
        env:
          VERIFY_KEY_ENTROPY_TARGET: 'synthetic-ci-fixture-64-hex-chars-0123456789abcdef0123456789ab'
        run: bash scripts/verify-key-entropy.sh

      - name: KEY_PARITY no-SHA-in-logs gate (ADR-0024 §4 / F-124 M-124b)
        # Greps log emission surfaces for the SHA-bearing variable names
        # from key-parity.ts. Fail-closed on any reference.
        run: bash scripts/verify-no-sha-in-logs.sh

      - name: KEY_PARITY EF import coverage (ADR-0024 §2)
        # Each Edge Function MUST import + call assertKeyParity, OR be on
        # the rollout-exempt list with a rollout-PR comment. New EFs must
        # do one or the other.
        run: bash scripts/verify-key-parity-import.sh

      - name: KEY_PARITY deploy-time check (ADR-0024 §1 / informational on PR)
        # The deploy-time parity check. In PR CI the script runs in
        # informational mode (no DEPLOY_DB_URL set) — it asserts its own
        # invocation contract without touching production. The production
        # deploy workflow MUST set DEPLOY_DB_URL + HMAC_PSEUDONYM_KEY.
        run: bash scripts/verify-key-parity-deploy.sh

      - name: F-116 session_is_live uniformity gate (ADR-0023 Amendment A)
        # Asserts every EF op dispatcher EITHER imports + calls
        # assertSessionLive (the new TS-side precheck pattern) OR is on
        # the closed allowlist (mint-session) OR is on the rollout-exempt
        # list with a rollout-PR comment. Also asserts the
        # MINT_SESSION_PATHS constant is exactly the two mint-session
        # paths (closed-set invariant per F-122).
        run: bash scripts/verify-session-live-uniformity.sh

      - name: Run verify.sh (informational)
        run: bash scripts/verify.sh

  # Blocking: SQL-layer (pgTAP) tests for the committee_membership migration
  # (T06.1 / ADR-0022). Applies the migrations to a real Postgres + pgTAP and
  # asserts the RLS + SECURITY DEFINER function behaviour.
  committee-db-tests:
    name: Committee DB tests (pgTAP)
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Postgres + pgTAP
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql postgresql-contrib pgtap \
            libtap-parser-sourcehandler-pgtap-perl

      - name: Start Postgres
        run: |
          ver="$(ls /etc/postgresql | sort -n | tail -1)"
          sudo pg_ctlcluster "$ver" main start || sudo systemctl start postgresql
          until sudo -u postgres pg_isready; do sleep 1; done

      - name: Apply migrations + run pgTAP
        run: |
          set -euo pipefail
          # The postgres OS user can't read the checkout under /home/runner
          # (permission denied), so stage the SQL in world-readable /tmp where
          # `sudo -u postgres` can open it.
          mkdir -p /tmp/dbtest
          cp supabase/test/fixtures/local_shim.sql \
             supabase/migrations/00000000000000_bootstrap.sql \
             supabase/migrations/00000000000001_auth.sql \
             supabase/migrations/00000000000002_committee.sql \
             supabase/migrations/00000000000003_mint.sql \
             supabase/migrations/00000000000004_concerns.sql \
             supabase/migrations/00000000000005_reprisal.sql \
             supabase/migrations/00000000000006_t14.sql \
             supabase/migrations/00000000000007_t07.sql \
             supabase/migrations/00000000000008_t07_f02.sql \
             supabase/migrations/00000000000009_t07_selftest_fail.sql \
             supabase/migrations/00000000000010_t07_recovery_blob_get.sql \
             supabase/migrations/00000000000011_t19_panic_wipe.sql \
             supabase/migrations/00000000000015_adr0015_amend_i_retention_classes.sql \
             supabase/migrations/00000000000016_adr0024_key_parity_check.sql \
             supabase/migrations/00000000000017_adr0023_amend_a_f128.sql \
             supabase/migrations/00000000000018_adr0024_key_parity_service_role_grant.sql \
             supabase/migrations/00000000000019_t16_retention_service_role.sql \
             supabase/migrations/00000000000020_t17_backup_writer_role.sql \
             supabase/migrations/00000000000021_t18_integrity_check_role.sql \
             supabase/migrations/00000000000022_t16_retention_sweep_functions.sql \
             supabase/migrations/00000000000023_t16_retention_ceiling_rule.sql \
             supabase/migrations/00000000000024_t17_backup_functions.sql \
             supabase/migrations/00000000000025_t18_integrity_check_functions.sql \
             supabase/migrations/00000000000026_t16_retention_sweep_runner.sql \
             supabase/migrations/00000000000027_t18_integrity_check_event_types.sql \
             supabase/migrations/00000000000028_t17_backup_read_functions.sql \
             supabase/migrations/00000000000029_t17_backup_emit_manifest_written.sql \
             supabase/migrations/00000000000030_t18_integrity_check_runner.sql \
             supabase/migrations/00000000000031_t17_backup_emit_hard_deleted.sql \
             supabase/test/committee_rls.sql \
             supabase/test/mint_rls.sql \
             supabase/test/concerns_rls.sql \
             supabase/test/reprisal_rls.sql \
             supabase/test/t14_rls.sql \
             supabase/test/t07_rls.sql \
             supabase/test/t07_f02_rls.sql \
             supabase/test/t07_selftest_fail_rls.sql \
             supabase/test/t07_recovery_blob_get_rls.sql \
             supabase/test/t19_panic_wipe_rls.sql \
             supabase/test/adr0015_amend_i_retention_classes.sql \
             supabase/test/adr0024_key_parity_check.sql \
             supabase/test/adr0023_amend_a_f128.sql \
             supabase/test/t16_retention_service_role.sql \
             supabase/test/t17_backup_writer_role.sql \
             supabase/test/t18_integrity_check_role.sql \
             supabase/test/t16_retention_sweep_functions.sql \
             supabase/test/t16_retention_ceiling_rule.sql \
             supabase/test/t17_backup_functions.sql \
             supabase/test/t18_integrity_check_functions.sql \
             supabase/test/t16_retention_sweep_runner.sql \
             supabase/test/t18_integrity_check_event_types.sql \
             supabase/test/t17_backup_read_functions.sql \
             supabase/test/t17_backup_emit_manifest_written.sql \
             supabase/test/t18_integrity_check_runner.sql \
             supabase/test/t17_backup_emit_hard_deleted.sql /tmp/dbtest/
          chmod -R a+rX /tmp/dbtest
          sudo -u postgres psql -c "DROP DATABASE IF EXISTS jhsc_test;" -c "CREATE DATABASE jhsc_test;"
          # Test HMAC key — NOT a secret (pgcrypto needs a non-empty key to run).
          sudo -u postgres psql -c "ALTER DATABASE jhsc_test SET app.hmac_pseudonym_key = 'ci-test-hmac-key-not-secret';"
          for f in \
            local_shim.sql \
            00000000000000_bootstrap.sql \
            00000000000001_auth.sql \
            00000000000002_committee.sql \
            00000000000003_mint.sql \
            00000000000004_concerns.sql \
            00000000000005_reprisal.sql \
            00000000000006_t14.sql \
            00000000000007_t07.sql \
            00000000000008_t07_f02.sql \
            00000000000009_t07_selftest_fail.sql \
            00000000000010_t07_recovery_blob_get.sql \
            00000000000011_t19_panic_wipe.sql \
            00000000000015_adr0015_amend_i_retention_classes.sql \
            00000000000016_adr0024_key_parity_check.sql \
            00000000000017_adr0023_amend_a_f128.sql \
            00000000000018_adr0024_key_parity_service_role_grant.sql \
            00000000000019_t16_retention_service_role.sql \
            00000000000020_t17_backup_writer_role.sql \
            00000000000021_t18_integrity_check_role.sql \
            00000000000022_t16_retention_sweep_functions.sql \
            00000000000023_t16_retention_ceiling_rule.sql \
            00000000000024_t17_backup_functions.sql \
            00000000000025_t18_integrity_check_functions.sql \
            00000000000026_t16_retention_sweep_runner.sql \
            00000000000027_t18_integrity_check_event_types.sql \
            00000000000028_t17_backup_read_functions.sql \
            00000000000029_t17_backup_emit_manifest_written.sql \
            00000000000030_t18_integrity_check_runner.sql \
            00000000000031_t17_backup_emit_hard_deleted.sql; do
            echo "applying $f"
            sudo -u postgres psql -v ON_ERROR_STOP=1 -d jhsc_test -f "/tmp/dbtest/$f"
          done
          sudo -u postgres pg_prove -d jhsc_test /tmp/dbtest/committee_rls.sql /tmp/dbtest/mint_rls.sql /tmp/dbtest/concerns_rls.sql /tmp/dbtest/reprisal_rls.sql /tmp/dbtest/t14_rls.sql /tmp/dbtest/t07_rls.sql /tmp/dbtest/t07_f02_rls.sql /tmp/dbtest/t07_selftest_fail_rls.sql /tmp/dbtest/t07_recovery_blob_get_rls.sql /tmp/dbtest/t19_panic_wipe_rls.sql /tmp/dbtest/adr0015_amend_i_retention_classes.sql /tmp/dbtest/adr0024_key_parity_check.sql /tmp/dbtest/adr0023_amend_a_f128.sql /tmp/dbtest/t16_retention_service_role.sql /tmp/dbtest/t17_backup_writer_role.sql /tmp/dbtest/t18_integrity_check_role.sql /tmp/dbtest/t16_retention_sweep_functions.sql /tmp/dbtest/t16_retention_ceiling_rule.sql /tmp/dbtest/t17_backup_functions.sql /tmp/dbtest/t18_integrity_check_functions.sql /tmp/dbtest/t16_retention_sweep_runner.sql /tmp/dbtest/t18_integrity_check_event_types.sql /tmp/dbtest/t17_backup_read_functions.sql /tmp/dbtest/t17_backup_emit_manifest_written.sql /tmp/dbtest/t18_integrity_check_runner.sql /tmp/dbtest/t17_backup_emit_hard_deleted.sql

  # Blocking: the FULL Supabase local stack (real GoTrue + PostgREST + Postgres).
  # Proves the committee RLS + session_is_live surface under the real auth
  # schema / auth.uid() / authenticated role — not the hand-rolled test shim
  # (ADR-0023 increment 5). The committee-op handler's end-to-end HTTP proof and
  # the mint-session handler land with T05.1 (the mint handler is deferred).
  supabase-live-stack:
    name: Supabase live stack (GoTrue + RLS)
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install pg_prove
        run: |
          sudo apt-get update
          sudo apt-get install -y libtap-parser-sourcehandler-pgtap-perl postgresql-client

      - name: Start Supabase (applies migrations; init seeds the dev GUC)
        run: supabase start

      # No GUC-pinning step: the Supabase local `postgres` role is not a
      # superuser and cannot ALTER DATABASE … SET a custom parameter, so the
      # pgTAP suite sets the (non-secret) pseudonym key itself at session scope.
      - name: Run committee pgTAP against the live stack (real auth.uid/RLS)
        run: |
          pg_prove -d "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            supabase/test/committee_rls.sql supabase/test/mint_rls.sql supabase/test/concerns_rls.sql supabase/test/reprisal_rls.sql supabase/test/t14_rls.sql supabase/test/t07_rls.sql supabase/test/t07_f02_rls.sql supabase/test/t07_selftest_fail_rls.sql supabase/test/t07_recovery_blob_get_rls.sql supabase/test/t19_panic_wipe_rls.sql

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup || true

  # Mint live-trust e2e — runs scripts/mint-live-e2e.sh against a real Supabase
  # local stack. Proves the F-118 trust path end-to-end: the mint-issued ES256
  # token is JWKS-validated by real PostgREST, mint_writer may invoke a mint
  # RPC, and anon is denied. Isolated from supabase-live-stack so any friction
  # in the signing-key wiring reds only this job, not the committee/mint pgTAP
  # coverage above. See scripts/mint-live-e2e.README.md.
  mint-live-e2e:
    name: Mint live-trust e2e (asymmetric JWKS)
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.46.x

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run the mint live-trust e2e
        run: bash scripts/mint-live-e2e.sh