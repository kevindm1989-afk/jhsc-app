# Supabase project configuration.
#
# Region: ca-central-1 (Canadian) per ADR-0001 + JHSC-APP-PLAN.md §3.3.
# This file pins the project_id for the local stack; the production
# region is configured in the Supabase dashboard (cannot be set from
# config.toml) and verified by scripts/check-supabase-region.sh.

project_id = "jhsc-app"

# Region note (informational; the live region is verified at runtime by
# the test harness in apps/web/test/_helpers/supabase-test.ts per
# ADR-0001).
# region = "ca-central-1"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = false

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
# 300s (5 min) ceiling per ADR-0023 / threat-model F-116: short TTL bounds the
# window in which a revoked session's in-flight JWT could still authorize,
# backing the auth_sessions liveness gate (session_is_live).
jwt_expiry = 300
enable_signup = false
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = true

# WebAuthn / passkeys configured by Supabase platform; not all settings
# are exposed via config.toml at this revision.

[edge_runtime]
enabled = true
inspector_port = 8083
policy = "oneshot"

# The mint-session function is the passkey-LOGIN path: the caller has no session
# yet, so GoTrue must NOT require a bearer token to invoke it. Authority comes
# from the WebAuthn assertion verified inside the function, never from a JWT on
# the request (ADR-0023 / threat-model §3.12).
[functions.mint-session]
verify_jwt = false

# The bootstrap-first-co-chair function (ADR-0025) is the ONE-SHOT cold-instance
# path: a fresh project has zero users and nobody to authenticate it, so it must
# be invokable without a bearer token. It is NOT open — the SQL function it calls
# is mint_writer-only and aborts (advisory-lock + count=0) once any user exists,
# so it can succeed at most once. DELETE this function after first use (A4).
[functions.bootstrap-first-co-chair]
verify_jwt = false

# The redeem-invite function (ADR-0029 §3.18 / F-168) is the REPEATABLE,
# unauthenticated invitee-onboarding path: the invitee has no session yet (the
# redeem is how they get one), so GoTrue must NOT require a bearer token. Unlike
# bootstrap it is NOT one-shot — its gate is the single-use invite + 15-min TOTP,
# NOT BOOTSTRAP_ENABLED and NOT an EXISTS(users) guard. Its SQL terminal
# redeem_invite_complete is mint_writer-ONLY, so a direct anon/authenticated RPC
# cannot reach it. Authority comes from the verified attestation + invite + TOTP
# inside the function, never from a JWT on the request.
[functions.redeem-invite]
verify_jwt = false

[analytics]
enabled = false
