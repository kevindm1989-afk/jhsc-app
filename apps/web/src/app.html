<!doctype html>
<html lang="en-CA" %sveltekit.theme%>
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="referrer" content="no-referrer" />
    <!--
      System-font stack only. No Google Fonts, no Adobe Fonts, no CDN.
      Per JHSC-APP-PLAN.md §7 "No third-party JS at runtime" and the
      bundle-grep gate in scripts/verify-no-third-party-js.sh.
    -->
    <style>
      :root {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, 'Helvetica Neue', Arial,
          'Liberation Sans', sans-serif;
        font-size: 16px;
        line-height: 1.5;
      }
      body {
        margin: 0;
        background: #fbfbfa;
        color: #16181d;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #0c0e12;
          color: #f4f5f7;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
        }
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <!--
      JS-disabled fallback. The app uses adapter-static with ssr=false,
      so a JS-disabled browser receives a blank shell. Without this
      block, the user sees no explanation. The catalog isn't usable
      here (t() is a runtime call); the message is static en-CA. A
      future fr-CA build can produce a duplicate fr-CA app.html via
      the build pipeline.
    -->
    <noscript>
      <main>
        <h1>JavaScript required</h1>
        <p>
          This app needs JavaScript to run. Enable JavaScript in your browser settings and reload
          the page.
        </p>
      </main>
    </noscript>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
