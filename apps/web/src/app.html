<!doctype html>
<html lang="en-CA" %sveltekit.theme%>
  <head>
    <meta charset="utf-8" />
    <!--
      Favicon + home-screen icon. The SVG mark serves both the desktop
      tab favicon and the iOS `apple-touch-icon` role (iOS 14+ accepts
      SVG; older versions fall back to the favicon). Designer follow-up
      replaces the placeholder mark with the final brand iconography
      and adds rasterized PNG sources (192/512 minimum) for any UA that
      doesn't support SVG icons.
    -->
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <!--
      PWA manifest — declares name / scope / display / brand colors so
      "Add to Home Screen" produces an installable, app-shell-like
      surface (per JHSC-APP-PLAN.md threat T10: installable without an
      app-store account). The manifest itself is the only required wire-
      up; the service-worker register call is a separate follow-up.
    -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <!--
      theme-color drives the OS chrome (URL bar on Android, status bar
      tint on iOS standalone). Slate-indigo `accent.default` from
      design-tokens.json. Light/dark variants would split this via
      `media=(prefers-color-scheme: ...)` once a dark brand token lands;
      shipping the single light-mode value first so the chrome is
      branded today.
    -->
    <meta name="theme-color" content="#2d3a8c" />
    <!--
      iOS standalone-mode hints (Safari-only — Android ignores these in
      favor of the manifest's display:standalone). `apple-mobile-web-app-
      capable=yes` lets a user Add to Home Screen and launch into a
      chrome-less app surface (no Safari address bar). The status-bar
      style is set to default so iOS picks tint by surface background;
      `black-translucent` would let body content paint under the notch
      and is reserved for a deliberate full-bleed pass.
    -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="JHSC" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="referrer" content="no-referrer" />
    <!--
      Disable mobile-browser auto-link detection. Without this, Safari
      iOS (and other mobile UAs) scan visible text for phone numbers /
      email addresses / postal addresses / dates / calendar events and
      auto-convert them into tel:/mailto:/calshow:/maps: links with
      tooltips + share-menu integration. Worker-side concern / reprisal
      narratives routinely include phone numbers + employer addresses
      that the audit-trail handles correctly server-side; we don't
      want the browser to ALSO surface them as taps in the share menu,
      hover tooltips, or recent-history overlays — that's a forensic
      side-channel the threat model doesn't cover. The address +
      email + date detectors are off by default on most UAs but
      `telephone=yes` is the Safari iOS default; setting all four to
      `no` keeps every detector off uniformly.
    -->
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />
    <!--
      System-font stack only. No Google Fonts, no Adobe Fonts, no CDN.
      Per JHSC-APP-PLAN.md §7 "No third-party JS at runtime" and the
      bundle-grep gate in scripts/verify-no-third-party-js.sh.
    -->
    <style>
      :root {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, 'Helvetica Neue',
          Arial, 'Liberation Sans', sans-serif;
        font-size: 16px;
        line-height: 1.5;
      }
      body {
        margin: 0;
        background: #fbfbfa;
        color: #16181d;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #0c0e12;
          color: #f4f5f7;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
        }
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <!--
      JS-disabled fallback. The app uses adapter-static with ssr=false,
      so a JS-disabled browser receives a blank shell. Without this
      block, the user sees no explanation. The catalog isn't usable
      here (t() is a runtime call); the message is static en-CA. A
      future fr-CA build can produce a duplicate fr-CA app.html via
      the build pipeline.
    -->
    <noscript>
      <main>
        <h1>JavaScript required</h1>
        <p>
          This app needs JavaScript to run. Enable JavaScript in your browser settings and reload
          the page.
        </p>
      </main>
    </noscript>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
