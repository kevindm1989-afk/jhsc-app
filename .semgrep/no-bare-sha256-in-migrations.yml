rules:
  - id: no-bare-sha256-in-migrations
    message: |
      Use hmac(X, current_setting('app.hmac_pseudonym_key'), 'sha256') for
      pseudonym derivation in migrations. Bare digest(X, 'sha256') is not a
      pseudonym — it is brute-forceable for low-entropy inputs and breaks the
      audit-log §2 same-key correlation property.
    languages: [generic]
    paths:
      include:
        - "supabase/migrations/**.sql"
    pattern-either:
      # G-T05-9: cover lowercase + uppercase, single + double-quoted, and
      # the schema-qualified pgcrypto.digest() form. The original rule
      # only caught the lowercase single-quoted spelling — three sibling
      # spellings would have slipped through identical bug.
      - pattern: digest($X, 'sha256')
      - pattern: digest($X, "sha256")
      - pattern: DIGEST($X, 'sha256')
      - pattern: DIGEST($X, "sha256")
      - pattern: pgcrypto.digest($X, 'sha256')
      - pattern: pgcrypto.digest($X, "sha256")
      - pattern: extensions.digest($X, 'sha256')
      - pattern: extensions.digest($X, "sha256")
    severity: ERROR
