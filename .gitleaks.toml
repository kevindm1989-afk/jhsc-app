# gitleaks configuration for jhsc-app.
#
# Extends gitleaks' default ruleset (useDefault = true) and allowlists
# known-synthetic, non-secret test fixtures that are deliberately shaped
# like credentials so the corresponding tests/CI gates can prove their
# defensive logic. None of these are real secrets.
#
# Sources of fixtures:
#   - T02 Sentry-scrub test (apps/web/test/T02/sentry-scrub.test.ts):
#     proves scrubFreeText() collapses key-shaped blobs.
#   - ADR-0024 / M2 KEY_PARITY infrastructure:
#     - supabase/functions/_shared/test/key-parity.test.ts asserts the
#       SHA-of-key never appears in error messages + the key-value-never-
#       leaks invariant.
#     - .github/workflows/ci.yml runs verify-key-entropy.sh against a
#       synthetic fixture (the REAL $HMAC_PSEUDONYM_KEY is never read
#       by CI outside the deploy job; see .context/secret-inventory.md).
#
# Single [allowlist] block so the schema is unambiguous across gitleaks
# 8.x point releases (the [[allowlists]] array form lands in 8.18+ but
# we keep the singular form to avoid any parser-version drift risk).

[extend]
useDefault = true

[allowlist]
description = "Project-wide synthetic-fixture allowlist (see file header for context). Files listed in `paths` contain DELIBERATE key-shaped strings that prove privacy invariants (T02 Sentry-scrub test scrubs key-shaped blobs; ADR-0024 KEY_PARITY tests assert the SHA/key never appears in error messages; CI workflow exercises verify-key-entropy.sh against a fixed-length synthetic). The real $HMAC_PSEUDONYM_KEY classification + emission-surface denylist live in .context/secret-inventory.md and apply to the REAL secret, NEVER to any string in these files. Path-only (no regex list) so gitleaks rule-version drift never reopens these files."
paths = [
  '''apps/web/test/T02/sentry-scrub\.test\.ts''',
  '''supabase/functions/_shared/test/key-parity\.test\.ts''',
  '''\.github/workflows/ci\.yml''',
]
