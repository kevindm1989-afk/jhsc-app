# gitleaks configuration for jhsc-app.
#
# Extends gitleaks' default ruleset (useDefault = true) and allowlists a
# known-synthetic, non-secret test fixture that is deliberately shaped like
# a credential so the Sentry-scrub test can prove scrubFreeText() collapses
# key-shaped blobs. This is NOT a real secret.
#
# Also allowlists supabase/signing_keys.test.json: a pair of P-256 ES256 JWKs
# generated solely as CI test material (mint live-e2e). Their public halves are
# published in the local stack JWKS; they sign nothing outside CI and guard no
# real data. NOT a real secret.

[extend]
useDefault = true

[allowlist]
description = "Synthetic 40-char base64-shaped fixture in the T02 Sentry-scrub test — hand-typed test data proving the scrubber collapses key-shaped blobs; not a credential. Plus the non-secret ES256 CI test signing keys."
paths = [
  '''apps/web/test/T02/sentry-scrub\.test\.ts''',
  '''supabase/signing_keys\.test\.json'''
]
regexes = ['''AbCdEfGhIjKlMnOpQrStUvWxYz0123456789AbCd''']
